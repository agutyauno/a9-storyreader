<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Editor Sign In</title>
    <link rel="stylesheet" href="../global/style.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body style="background: #0f1724;">
        <div class="login-card" style="width:520px;max-width:95vw;padding:32px;border-radius:10px;background:var(--color-surface,#0f1724);color:var(--color-text,#fff);box-shadow:0 16px 40px rgba(0,0,0,0.6);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);">
            <h2 style="margin:0 0 18px 0;font-size:22px;font-weight:600">Sign in to Editor</h2>
            <form id="login-form">
                <div style="margin-bottom:10px; justify-content: center;display: flex;flex-direction: column;align-items: flex-start;">
                    <label for="login-email" style="display:block;font-size:14px;color:var(--color-text-secondary)">Email</label>
                    <input id="login-email" type="email" required placeholder="you@example.com" style="width:95%;padding:14px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:inherit;font-size:16px;align-self: center;">
                </div>
                <div style="margin-bottom:10px; justify-content: center;display: flex;flex-direction: column;align-items: flex-start;">
                    <label for="login-password" style="display:block;font-size:14px;color:var(--color-text-secondary)">Password</label>
                    <input id="login-password" type="password" required placeholder="password" style="width:95%;padding:14px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:inherit;font-size:16px;align-self: center;">
                </div>
                <div id="login-error" style="color:#ff6b6b;margin-bottom:10px;display:none;font-size:14px"></div>
                <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:10px">
                    <div style="font-size:14px;color:var(--color-text-secondary)">Uses Supabase auth</div>
                    <div>
                        <button type="submit" class="btn-primary" style="padding:12px 18px;font-size:16px">Sign in</button>
                    </div>
                </div>
            </form>
        </div>


    <script src="../global/supabase-client.js"></script>
    <script src="./login.js"></script>
</body>
</html>
