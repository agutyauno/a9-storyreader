<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Editor</title>
    <link rel="icon" type="image/png" href="../assets/images/icon/dreambind castle_b.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/material-darker.min.css">
    <link rel="stylesheet" href="../global/style.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <div id="editor-header">
            <a href="../home_page/index.html">
                <img class="header-logo" src="../assets/images/icon/dreambind castle.png" alt="">
            </a>
            <p class="header-title">Story Editor</p>
        </div>
    </header>
    <main>
        <section id="left-sidebar">
            <div id="sidebar-tabs">
                <button class="sidebar-tab-btn active" data-tab="story">Story</button>
                <button class="sidebar-tab-btn" data-tab="asset">Asset</button>
            </div>
            
            <div class="story_tab tab-content active">
                <div id="tree-toolbar">
                    <button class="toolbar-btn" id="add-region-btn" title="Add new region">
                        <span class="btn-icon">+</span> Region
                    </button>
                    <button class="toolbar-btn" id="add-arc-btn" title="Add new arc" disabled>
                        <span class="btn-icon">+</span> Arc
                    </button>
                    <button class="toolbar-btn" id="add-event-btn" title="Add new event" disabled>
                        <span class="btn-icon">+</span> Event
                    </button>
                    <button class="toolbar-btn" id="add-story-btn" title="Add new story" disabled>
                        <span class="btn-icon">+</span> Story
                    </button>
                </div>
                <div id="story-tree-container">
                    <ul class="tree" id="story-tree"></ul>
                </div>
            </div>
            
            <div class="asset_tab tab-content">
                <div id="asset-search-bar">
                    <input type="text" id="asset-search-input" placeholder="Search assets..." autocomplete="off">
                    <button id="add-asset-btn">+ Add Asset</button>
                </div>
                <div id="asset-nav-header" style="display: none;">
                    <button id="asset-back-btn" title="Back to categories">◀</button>
                    <span id="asset-nav-title"></span>
                </div>
                <div id="asset-content">
                    <div id="asset-category-grid"></div>
                    <div id="asset-list" style="display: none;"></div>
                </div>
            </div>
        </section>
        <section id="editor"></section>
    </main>
    
    <!-- Add Item Modal -->
    <div id="add-item-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Add New Item</h3>
                <button class="modal-close" id="modal-close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <form id="add-item-form">
                    <input type="hidden" id="item-type" name="type">
                    <input type="hidden" id="parent-id" name="parentId">
                    
                    <div class="form-group">
                        <label for="item-name">Name <span style="color: #ff6b6b;">*</span></label>
                        <input type="text" id="item-name" name="name" required placeholder="Enter name">
                    </div>
                    
                    <div class="form-group">
                        <label for="item-description">Description</label>
                        <textarea id="item-description" name="description" rows="3" placeholder="Enter description (optional)"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="item-display-order">Display Order</label>
                        <input type="number" id="item-display-order" name="displayOrder" min="1" placeholder="Auto (next available)">
                    </div>
                    
                    <div class="form-group" id="image-upload-group" style="display: none;">
                        <label>Image</label>
                        <small style="color: var(--color-text-tertiary); font-size: var(--font-size-xs); display: block; margin-bottom: 8px;">For Region: icon image | For Event: banner image</small>
                        
                        <div style="display: flex; gap: var(--spacing-sm); margin-bottom: var(--spacing-sm);">
                            <button type="button" class="image-option-btn active" data-option="file">Upload File</button>
                            <button type="button" class="image-option-btn" data-option="url">Enter URL</button>
                        </div>
                        
                        <div id="file-upload-section">
                            <input type="file" id="item-image-file" accept="image/*" style="display: none;">
                            <button type="button" id="choose-file-btn" class="btn-secondary" style="width: 100%;">
                                Choose Image File
                            </button>
                            <div id="file-name-display" style="margin-top: 8px; font-size: var(--font-size-xs); color: var(--color-text-secondary);"></div>
                        </div>
                        
                        <div id="url-input-section" style="display: none;">
                            <input type="text" id="item-image-url" placeholder="Enter image URL">
                        </div>
                        
                        <div id="image-preview" style="margin-top: var(--spacing-sm); display: none;">
                            <img id="preview-img" src="" alt="Preview" style="max-width: 100%; max-height: 150px; border-radius: var(--radius-base); border: 1px solid var(--color-border);">
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn-secondary" id="cancel-btn">Cancel</button>
                        <button type="submit" class="btn-primary">Add Item</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Image Picker Modal -->
    <div id="image-picker-modal" class="modal" style="display: none;">
        <div class="modal-content image-picker-modal-content">
            <div class="modal-header">
                <h3>Select Image</h3>
                <button class="modal-close" id="image-picker-close-btn">&times;</button>
            </div>
            <div class="modal-body image-picker-body">
                <div id="image-picker-grid" class="image-picker-grid"></div>
            </div>
            <div class="image-picker-footer">
                <div class="image-picker-footer-left">
                    <button type="button" class="btn-secondary" id="image-picker-upload-btn">Upload New Image</button>
                    <input type="file" id="image-picker-file" accept="image/*" style="display:none;">
                </div>
                <div class="image-picker-footer-right">
                    <button type="button" class="btn-secondary" id="image-picker-cancel-btn">Cancel</button>
                    <button type="button" class="btn-primary" id="image-picker-select-btn">Select</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Asset Preview Modal -->
    <div id="asset-preview-modal" class="modal" style="display: none;">
        <div class="modal-content asset-preview-modal-content">
            <div class="modal-header">
                <h3 id="asset-preview-title">Asset Preview</h3>
                <button class="modal-close" id="asset-preview-close-btn">&times;</button>
            </div>
            <div class="modal-body asset-preview-body">
                <div id="asset-preview-media"></div>
                <div id="asset-preview-info"></div>
            </div>
            <div class="asset-preview-footer">
                <div style="margin-right:auto; display:flex; gap:8px;">
                    <button type="button" class="btn-secondary" id="asset-preview-edit-btn">Edit</button>
                    <button type="button" class="btn-secondary" id="asset-preview-delete-btn">Delete</button>
                </div>
                <div>
                    <button type="button" class="btn-secondary" id="asset-preview-copy-btn">Copy Asset ID</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Asset Modal -->
    <div id="add-asset-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="add-asset-modal-title">Create Asset</h3>
                <button class="modal-close" id="add-asset-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="add-asset-form">
                    <div class="form-group">
                        <label for="asset-type">Type <span style="color: #ff6b6b;">*</span></label>
                        <select id="asset-type" required class="editor-input">
                            <option value="">Select type</option>
                            <option value="character">Character</option>
                            <option value="image">Image / Thumbnail</option>
                            <option value="gallery">Gallery Image</option>
                            <option value="background">Background Image</option>
                            <option value="video">Video</option>
                            <option value="bgm">BGM (audio)</option>
                            <option value="sfx">SFX (audio)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="asset-id">Asset ID <span style="color: #ff6b6b;">*</span></label>
                        <input type="text" id="asset-id" class="editor-input" placeholder="e.g. char-new, sfx-step" required>
                        <small style="color: var(--color-text-tertiary);">Must be unique.</small>
                    </div>

                    <div class="form-group">
                        <label for="asset-name">Display Name</label>
                        <input type="text" id="asset-name" class="editor-input" placeholder="Human-friendly name">
                    </div>

                    <div id="asset-character-section" style="display:none;">
                        <div class="form-group">
                            <label for="asset-desc">Description</label>
                            <textarea id="asset-desc" class="editor-textarea" rows="3" placeholder="Character description"></textarea>
                        </div>

                        <div class="form-group">
                            <label>Expressions</label>
                            <div id="expressions-list"></div>
                            <div style="display:flex; gap:8px; margin-top:8px;">
                                <button type="button" id="add-expression-btn" class="btn-secondary">+ Add Expression</button>
                            </div>
                        </div>
                    </div>

                    <div id="asset-media-section" style="display:none;">
                        <div class="form-group">
                            <label id="media-label">Media File <span style="color: #ff6b6b;">*</span></label>
                            <input type="file" id="asset-file-input" accept="image/*,audio/*,video/*">
                            <div id="asset-file-name" style="margin-top:8px; font-size:var(--font-size-xs); color:var(--color-text-secondary);"></div>
                        </div>
                        <div id="media-preview" style="display:none; margin-top:8px;"></div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-secondary" id="add-asset-cancel">Cancel</button>
                        <button type="submit" class="btn-primary">Create Asset</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Edit Asset Modal (separate from Create) -->
    <div id="edit-asset-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="edit-asset-modal-title">Edit Asset</h3>
                <button class="modal-close" id="edit-asset-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="edit-asset-form">
                    <div class="form-group">
                        <label for="edit-asset-type">Type</label>
                        <input type="text" id="edit-asset-type" class="editor-input" readonly>
                    </div>

                    <div class="form-group">
                        <label for="edit-asset-id">Asset ID</label>
                        <input type="text" id="edit-asset-id" class="editor-input" readonly>
                    </div>

                    <div class="form-group">
                        <label for="edit-asset-name">Display Name</label>
                        <input type="text" id="edit-asset-name" class="editor-input">
                    </div>

                    <div id="edit-asset-character-section" style="display:none;">
                        <div class="form-group">
                            <label for="edit-asset-desc">Description</label>
                            <textarea id="edit-asset-desc" class="editor-textarea" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Expressions</label>
                            <div id="edit-expressions-list"></div>
                            <div style="display:flex; gap:8px; margin-top:8px;">
                                <button type="button" id="edit-add-expression-btn" class="btn-secondary">Add Expression</button>
                            </div>
                        </div>
                    </div>

                    <div id="edit-asset-media-section" style="display:none;">
                        <div class="form-group">
                            <label id="edit-media-label">Replace File (optional)</label>
                            <input type="file" id="edit-asset-file-input" accept="image/*,audio/*,video/*">
                            <div id="edit-asset-file-name" style="margin-top:8px; font-size:var(--font-size-xs); color:var(--color-text-secondary);"></div>
                        </div>
                        <div id="edit-media-preview" style="display:none; margin-top:8px;"></div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-secondary" id="edit-asset-cancel">Cancel</button>
                        <button type="submit" class="btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../global/script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/selection/active-line.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/matchbrackets.min.js"></script>
    <script src="./story-editor.js"></script>
    <script src="./script.js"></script>
</body>
</html>
