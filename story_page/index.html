<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story - Arknights Story Reader</title>
    <link rel="icon" type="image/png" href="../assets/images/icon/dreambind castle_b.png">
    <link rel="stylesheet" href="../global/style.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>
        <div id="story_page-header">
            <a href="../home_page/index.html">
                <img class="header-logo" src="../assets/images/icon/dreambind castle.png" alt="">
            </a>
            <a id="header-event-link" href="../event_page/index.html" class="header-name-link">
                <h1 class="header-name">event name</h1>
            </a>

            <!-- Header Right Controls -->
            <div class="header-right-controls">
                <!-- Audio Controls -->
                <div id="audio-controls" class="audio-controls">
                    <button id="audio-toggle" class="audio-btn" title="Bật/Tắt âm thanh">
                        <span id="audio-icon" class="audio-icon">🔊</span>
                    </button>
                    <div class="volume-slider-container">
                        <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="100" title="Âm lượng">
                    </div>
                </div>

                <button id="sidebar-toggle" class="sidebar-toggle-btn"><img src="../assets/images/web icon/list.png"
                        alt=""></button>
            </div>
        </div>
    </header>

    <!-- Sidebar danh sách chapters -->
    <div id="chapter-sidebar" class="chapter-sidebar">
        <div class="sidebar-header">
            <h2>Danh sách chương</h2>
            <!-- <button id="sidebar-close" class="sidebar-close-btn">Đóng</button> -->
        </div>
        <div class="sidebar-content">
            <ul class="chapter-list">
                <li><a href="#" class="chapter-item active">ST-1 Before: Story Name</a></li>
                <li><a href="#" class="chapter-item">ST-2</a></li>
                <li><a href="#" class="chapter-item">ST-3</a></li>
                <li><a href="#" class="chapter-item">ST-4</a></li>
                <li><a href="#" class="chapter-item">ST-5</a></li>
                <li><a href="#" class="chapter-item">ST-6</a></li>
                <li><a href="#" class="chapter-item">ST-7</a></li>
                <li><a href="#" class="chapter-item">ST-8</a></li>
            </ul>
        </div>
    </div>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Image Modal for Character -->
    <div id="character-modal" class="image-modal" aria-hidden="true">
        <div class="modal-content">
            <img class="modal-image" src="" alt="Character Image">
        </div>
    </div>

    <!-- Image Modal for Background -->
    <div id="background-modal" class="image-modal" aria-hidden="true">
        <div class="modal-content">
            <img class="modal-image" src="" alt="Background Image">
        </div>
    </div>

    <!-- ================================================================================= -->
    <main>
        <div class="container">
            <div id="info">
                <div class="info-header">
                    <p id="dr-name">Dr. <input type="text" placeholder="@nickname"></p> 
                    <h2 class="info-title">Loading...</h2>
                </div>
                <p class="info-description"></p>
            </div>

            <div id="story-content">
                <!-- Story content will be loaded from Supabase -->
                <div class="loading-placeholder">Đang tải...</div>
            </div>

            <div class="switch-chapter-button">
                <!-- nút chuyển chap -->
                <button class="prevous">Chương trước </button>
                <button class="next"> Chương sau</button>
            </div>
        </div>
    </main>
    <!-- ================================================================================= -->

    <!-- Back to top button -->
    <button id="back-to-top" class="back-to-top" aria-label="Quay lại đầu trang">
        <img src="../assets/images/web icon/arrow-up.png" alt="" onerror="this.outerHTML='&#8593;'">
    </button>

    <!-- Footer will be loaded here -->
    <div id="footer-placeholder"></div>
</body>
<script src="../global/supabase-client.js"></script>
<script src="../global/supabase-api.js"></script>
<script src="../global/script.js"></script>
<script src="./bgm-manager.js"></script>
<script src="./sfx-manager.js"></script>
<script src="./story-renderer.js"></script>
<script src="./script.js"></script>

</html>
